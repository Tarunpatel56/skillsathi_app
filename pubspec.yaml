name: edusarthi_app
description: "EduSarthi – AI-powered learning platform for English, Interview Prep & Aptitude."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.6.6
  http: ^1.2.2
  flutter_webrtc: ^1.3.1
  firebase_core: ^3.12.1
  firebase_database: ^11.3.3
  path_provider: ^2.1.5
  uuid: ^4.5.1
  intl: ^0.20.2
  permission_handler: ^11.4.0
  image_picker: ^1.1.2
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
